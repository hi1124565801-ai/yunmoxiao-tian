name: Sync and deploy portfolio update

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Sync latest portfolio source
        run: |
          curl -fsSL "https://yunmoxiao-field-notes.fairy-gnat-3713.chatgpt.site/github-source.tar.gz" -o /tmp/site-source.tar.gz
          rm -rf /tmp/site-source
          tar -xzf /tmp/site-source.tar.gz -C /tmp
          rsync -a --delete --exclude ".git/" --exclude ".github/workflows/deploy-pages.yml" /tmp/site-source/ ./
          git checkout -- .github/workflows/deploy-pages.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update Yunmoxiao Tian portfolio"
            git push origin main
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build static site
        run: pnpm run build:github

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
